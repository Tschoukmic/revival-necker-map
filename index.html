:root {

}

  max-width: 1320px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: minmax(0, 2.1fr) minmax(220px, 0.95fr);
  gap: 16px;
  align-items: stretch;
}
.revival-necker-banner-card {

  background: transparent;

  justify-content: center;
}

  max-width: 100%;
  height: 88px;

  background: transparent;
}
.revival-necker-banner-left img {

}
.revival-necker-banner-right img {
  object-fit: contain;
  object-position: center center;
}
body .folium-map {

const revivalNeckerMap = map_bce508e55be7ec7cd5fd2e14529a1d32;
const revivalNeckerInput = document.getElementById("revival-necker-search-input");
const revivalNeckerButton = document.getElementById("revival-necker-search-button");
const revivalNeckerHelp = document.getElementById("revival-necker-search-help");
const revivalNeckerDatalist = document.getElementById("revival-necker-search-suggestions");
const revivalNeckerResultCard = document.getElementById("revival-necker-search-result-card");
const revivalNeckerResultName = document.getElementById("revival-necker-search-result-name");
const revivalNeckerResultMeta = document.getElementById("revival-necker-search-result-meta");
const revivalNeckerResultLocation = document.getElementById("revival-necker-search-result-location");
const revivalNeckerResultHint = document.getElementById("revival-necker-search-result-hint");
const revivalNeckerResultButton = document.getElementById("revival-necker-search-result-show-group");
const revivalNeckerResultClose = document.getElementById("revival-necker-search-result-close");
let revivalNeckerActiveResultEntry = null;

function revivalNeckerNormalize(value) {
  return (value || "")
    .toString()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase()
    .trim();
}

const revivalNeckerSuggestionSeen = new Set();
revivalNeckerSearchEntries.forEach((entry) => {
  (entry.suggestions || []).forEach((text) => {
    const normalized = revivalNeckerNormalize(text);
    if (!normalized || revivalNeckerSuggestionSeen.has(normalized)) {
      return;
    }
    revivalNeckerSuggestionSeen.add(normalized);
    const option = document.createElement("option");
    option.value = text;
    revivalNeckerDatalist.appendChild(option);
  });
});

function revivalNeckerScore(entry, query) {
  const aliases = entry.search_terms || [];
  let best = 999;
  for (const alias of aliases) {
    if (alias === query) {
      best = Math.min(best, 0);
    } else if (alias.startsWith(query)) {
      best = Math.min(best, 1);
    } else if (alias.includes(query)) {
      best = Math.min(best, 2);
    }
  }
  return best;
}

function revivalNeckerFindMatches(query) {
  if (!query) {
    return [];
  }
  return revivalNeckerSearchEntries
    .map((entry) => ({ entry, score: revivalNeckerScore(entry, query) }))
    .filter((item) => item.score < 999)
    .sort((a, b) => {
      if (a.score !== b.score) {
        return a.score - b.score;
      }
      if (a.entry.entry_type !== b.entry.entry_type) {
        return a.entry.entry_type === "person" ? -1 : 1;
      }
      return a.entry.display_label.localeCompare(b.entry.display_label);
    });
}

function revivalNeckerHideResultCard() {
  revivalNeckerActiveResultEntry = null;
  revivalNeckerResultCard.style.display = "none";
}

function revivalNeckerShowPersonCard(entry, matchCount) {
  revivalNeckerActiveResultEntry = entry;
  revivalNeckerResultName.textContent = entry.person_name || entry.display_label;
  const specialty = entry.person_specialty || "Specialty not listed";
  revivalNeckerResultMeta.textContent = specialty;
  revivalNeckerResultLocation.textContent = `Location: ${entry.person_location || entry.display_label}`;
  revivalNeckerResultHint.textContent = `${entry.group_label}: ${entry.group_count} ${entry.group_count === 1 ? "person" : "people"} at this point.${matchCount > 1 ? ` Showing best match of ${matchCount}.` : ""}`;
  revivalNeckerResultButton.textContent = entry.group_count > 1 ? `Show all ${entry.group_count} at this point` : "Show point details";
  revivalNeckerResultCard.style.display = "block";
}

function revivalNeckerOpenEntry(entry, matchCount) {
  const marker = window[entry.marker_var];
  if (!marker) {
    revivalNeckerHelp.textContent = "The matched marker could not be opened.";
    return;
  }
  const zoom = entry.region === "France" ? 9 : 5;
  revivalNeckerMap.flyTo([entry.latitude, entry.longitude], zoom);
  if (entry.entry_type === "person") {
    revivalNeckerMap.closePopup();
    revivalNeckerShowPersonCard(entry, matchCount);
    revivalNeckerHelp.textContent = `Showing ${entry.person_name} at ${entry.group_label}.${matchCount > 1 ? ` Best match of ${matchCount}.` : ""}`;
    return;
  }

  revivalNeckerHideResultCard();
  marker.openPopup();
  const names = (entry.names || []).join(", ");
  const suffix = matchCount > 1 ? ` Showing best match of ${matchCount}.` : "";
  revivalNeckerHelp.textContent = `${entry.display_label}: ${names}.${suffix}`;
}

function revivalNeckerRunSearch() {
  const query = revivalNeckerNormalize(revivalNeckerInput.value);
  if (!query) {
    revivalNeckerHelp.textContent = "Type a person, place, or hospital.";
    return;
  }
  const matches = revivalNeckerFindMatches(query);
  if (!matches.length) {
    revivalNeckerHelp.textContent = "No match found.";
    return;
  }
  revivalNeckerOpenEntry(matches[0].entry, matches.length);
}

revivalNeckerButton.addEventListener("click", revivalNeckerRunSearch);
revivalNeckerInput.addEventListener("keydown", (event) => {
  if (event.key === "Enter") {
    event.preventDefault();
    revivalNeckerRunSearch();
  }
});
revivalNeckerInput.addEventListener("change", revivalNeckerRunSearch);
revivalNeckerResultButton.addEventListener("click", () => {
  if (!revivalNeckerActiveResultEntry) {
    return;
  }
  const marker = window[revivalNeckerActiveResultEntry.marker_var];
  if (marker) {
    marker.openPopup();
  }
});
revivalNeckerResultClose.addEventListener("click", revivalNeckerHideResultCard);
